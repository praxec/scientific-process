name: release
# Publishes cross-platform binaries + a multi-arch container image when a
# vX.Y.Z tag is pushed. (Registering in the MCP registry is a separate,
# auth-gated step — see server.json + README.)
on:
  push:
    tags: ["v*"]

permissions:
  contents: write   # upload release assets
  packages: write   # push to ghcr.io

jobs:
  binaries:
    name: binary (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { target: x86_64-unknown-linux-gnu,  os: ubuntu-latest }
          - { target: aarch64-unknown-linux-gnu, os: ubuntu-latest }
          - { target: x86_64-apple-darwin,        os: macos-latest }
          - { target: aarch64-apple-darwin,       os: macos-latest }
          - { target: x86_64-pc-windows-msvc,     os: windows-latest }
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: build + upload binary
        uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: scientific-process
          target: ${{ matrix.target }}
          archive: scientific-process-${{ matrix.target }}
          token: ${{ secrets.GITHUB_TOKEN }}

  image:
    name: container image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/praxec/scientific-process
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest
      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  registry:
    name: MCP registry
    needs: image
    runs-on: ubuntu-latest
    # Publishes server.json to the official MCP registry under io.github.praxec/*,
    # verified via GitHub OIDC (no secrets). NOTE: confirm the mcp-publisher install
    # + subcommands against current registry docs — the CLI is young.
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: install mcp-publisher
        run: |
          os=$(uname -s | tr '[:upper:]' '[:lower:]')
          curl -fsSL "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_${os}_amd64.tar.gz" -o mcp-publisher.tgz
          tar xzf mcp-publisher.tgz mcp-publisher
      - name: login (GitHub OIDC) + publish
        run: |
          ./mcp-publisher login github-oidc
          ./mcp-publisher publish
