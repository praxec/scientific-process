name: CI

on:
    push:
        branches: [main, dev]
    pull_request:
        branches: [main, dev]

env:
    CARGO_TERM_COLOR: always
    RUSTFLAGS: "-Dwarnings"

jobs:
    test:
        name: test (${{ matrix.os }})
        strategy:
            fail-fast: false
            matrix:
                os: [ubuntu-latest, macos-latest, windows-latest]
        runs-on: ${{ matrix.os }}
        timeout-minutes: 20
        steps:
            - uses: actions/checkout@v4
            - uses: dtolnay/rust-toolchain@stable
            - uses: Swatinem/rust-cache@v2
            - name: Build
              run: cargo build --all-targets
            - name: Test
              run: cargo test

    lint:
        name: fmt + clippy
        runs-on: ubuntu-latest
        timeout-minutes: 15
        steps:
            - uses: actions/checkout@v4
            - uses: dtolnay/rust-toolchain@stable
              with:
                  components: rustfmt, clippy
            - uses: Swatinem/rust-cache@v2
            - name: rustfmt
              run: cargo fmt --all --check
            - name: clippy
              run: cargo clippy --all-targets   # advisory (no -D warnings)
